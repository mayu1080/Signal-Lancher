appId: com.signallauncher.app
productName: Signal Launcher
copyright: Copyright © 2026
npmRebuild: false
buildDependenciesFromSource: false
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: config/show.default.json
    to: config/show.default.json
  - from: config/show.schema.json
    to: config/show.schema.json
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Signal Launcher
portable:
  artifactName: Signal-Launcher-${version}-portable.exe
